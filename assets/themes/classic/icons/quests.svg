<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Clipboard backplate -->
  <rect x="10" y="10" width="44" height="50" rx="4" ry="4"
        fill="#FFFFFF" stroke="#1B1B1B" stroke-width="2.5"/>
  <!-- Clip at top -->
  <rect x="22" y="4" width="20" height="10" rx="2" ry="2"
        fill="#FFEC00" stroke="#1B1B1B" stroke-width="2"/>
  <rect x="26" y="2" width="12" height="6" rx="1.5" ry="1.5"
        fill="#FFEC00" stroke="#1B1B1B" stroke-width="2"/>
  <!-- Checklist rows: check + line -->
  <g stroke="#1B1B1B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="17,28 21,32 27,24"/>
    <line x1="32" y1="28" x2="48" y2="28"/>
    <polyline points="17,40 21,44 27,36"/>
    <line x1="32" y1="40" x2="48" y2="40"/>
    <polyline points="17,52 21,56 27,48" opacity="0.45"/>
    <line x1="32" y1="52" x2="48" y2="52" opacity="0.45"/>
  </g>
</svg>
